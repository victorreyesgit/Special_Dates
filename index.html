<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Special Dates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ==========================
         HEADER
    ========================== -->
    <header>
        <h1 class="title">Special Dates</h1>
        <h2 class="subtitle">Because birthdays are not the only special days to celebrate!</h2>

        <!-- Language toggle with flags -->
        <div id="langIcon" class="lang-icon">
            🌐
            <div id="langMenu" class="lang-menu">
                <img src="flags/en.png" alt="English" data-lang="en">
                <img src="flags/es.png" alt="Español" data-lang="es">
            </div>
        </div>
    </header>

    <!-- ==========================
         INPUT DE FECHA
    ========================== -->
    <div class="input-container">
        <label class="input-label" for="dateInput">Enter your birthday</label>
        <input type="text" id="dateInput" placeholder="DD/MM/YYYY">
    </div>

    <!-- ==========================
         RESULTADOS
    ========================== -->
    <div id="result"></div>

    <!-- ==========================
         MODAL DE COMPARTIR
    ========================== -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h2>Share your special day!</h2>
            <p id="shareMessage"></p>
            <input id="shareLink" type="text" readonly>
            <button id="copyBtn">Copy to clipboard</button>
            <button onclick="closeModal()">✖</button>
        </div>
    </div>

    <!-- ==========================
         SCRIPT JS EXTERNO
    ========================== -->
    <script src="script.js"></script>

</body>
</html>
